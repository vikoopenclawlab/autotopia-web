name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================================================
  # Validate Release Tag
  # ===========================================================================
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV

          if ! [[ $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag format. Use v1.2.3"
            exit 1
          fi

          echo "✅ Valid tag: $TAG"

      - name: Extract changelog for this release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Extract changes from last release to this one
          if git tag | grep -q "^v"; then
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              git log $LAST_TAG..HEAD --oneline --format="- %s (%an)" > changes.txt
              echo "Changes since $LAST_TAG:"
              cat changes.txt
            fi
          fi

  # ===========================================================================
  # Build and Push Production Images
  # ===========================================================================
  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          commit email and message at end of each commit message to reflect the changes. If there's any issue with the request, do your best to navigate it and if it's a blocking issue, surface it to the user so they can take the appropriate steps to unblock it before trying again. If you face a Git conflict or merge conflict, do not propose anything, just surface it to the user with instructions on how to resolve it. username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/nextjs
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push with provenance
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            SHA=${{ github.sha }}
            VERSION=${GITHUB_REF#refs/tags/}
          provenance: true  # Sigstore provenance

  # ===========================================================================
  # Security Scan (blocking)
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'

  # ===========================================================================
  # Deploy to Staging (Verification)
  # ===========================================================================
  deploy-staging:
    name: Verify on Staging
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig

      - name: Deploy to staging
        run: |
          kubectl set image deployment/nextjs nextjs=${{ needs.build.outputs.image-tag }} -n plataformas-web-staging
          kubectl rollout status deployment/nextjs -n plataformas-web-staging --timeout=600s

      - name: Smoke tests
        run: |
          ./template/nextjs-fastify/scripts/smoke-test.sh --env staging

  # ===========================================================================
  # Approval Gate
  # ===========================================================================
  approval:
    name: Approval Required
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://app.plataformas.example.com

    # Manual approval required before production deploy
    environment: production

    steps:
      - name: Waiting for approval
        run: |
          echo "⏳ Waiting for production approval..."

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [approval, deploy-staging]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig

      - name: Deploy to production
        run: |
          kubectl apply -k infra/k8s/overlays/prod
          kubectl set image deployment/nextjs nextjs=${{ needs.build.outputs.image-tag }} -n plataformas-web

          # Rolling update
          kubectl rollout status deployment/nextjs -n plataformas-web --timeout=600s
          kubectl rollout status deployment/fastify-api -n plataformas-web --timeout=300s

      - name: Smoke tests
        run: |
          ./template/nextjs-fastify/scripts/smoke-test.sh --env production

      - name: Verify all pods healthy
        run: |
          kubectl get pods -n plataformas-web
          kubectl get svc -n plataformas-web

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Successfully deployed ${{ github.ref_name }} to production!",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 *Production Deploy Successful*\nVersion: ${{ github.ref_name }}\nCommit: <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nDeployed by: ${{ github.actor }}"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production deploy FAILED: ${{ github.ref_name }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Production Deploy FAILED*\nVersion: ${{ github.ref_name }}\nCommit: <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nDeployed by: ${{ github.actor }}\n\n:warning: *ROLLBACK IMMEDIATELY*"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")

          CHANGELOG="# Changes in $TAG\n\n"
          if git log $LAST_TAG..HEAD --oneline &>/dev/null; then
            CHANGELOG+=$(git log $LAST_TAG..HEAD --oneline --format="- %s (%an)" 2>/dev/null | head -20)
          else
            CHANGELOG+="See commit history for details"
          fi

          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}