# Kubernetes ConfigMap
# Environment-agnostic configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: nextjs-config
  namespace: plataformas-web
data:
  # Next.js public config (exposed to browser)
  NEXT_PUBLIC_API_URL: "https://api.plataformas.example.com"
  NEXT_PUBLIC_APP_NAME: "Plataformas Web"
  NODE_ENV: "production"
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: plataformas-web
data:
  NODE_ENV: "production"
  PORT: "4000"
  # CORS
  CORS_ORIGIN: "https://app.plataformas.example.com"
  # Rate limiting
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"
  # Meilisearch
  MEILISEARCH_HOST: "http://meilisearch:7700"
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  # Health check path
  HEALTH_PATH: "/health"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: plataformas-web
data:
  POSTGRES_DB: "app"
  # Connection pool settings
  POSTGRES_MAX_CONNECTIONS: "20"
  POSTGRES_IDLE_TIMEOUT_MS: "30000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: plataformas-web
data:
  REDIS_DB: "0"
  # TTL defaults
  REDIS_CACHE_TTL: "3600"
  REDIS_SESSION_TTL: "86400"