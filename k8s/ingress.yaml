# Kubernetes Ingress Manifest
# Traefik ingress configuration for k3s

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plataformas-web
  namespace: plataformas-web
  labels:
    app: plataformas-web
  annotations:
    # Traefik specific annotations
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: strip-prefix@file,compress@file
    # Rate limiting
    traefik.ingress.kubernetes.io/ratelimit: "100"
    traefik.ingress.kubernetes.io/ratelimit.average: "50"
spec:
  ingressClassName: traefik
  rules:
    # Main app - Next.js frontend
    - host: app.plataformas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs
                port:
                  number: 3000

---
# API Ingress - separate host for API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plataformas-api
  namespace: plataformas-web
  labels:
    app: plataformas-api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: compress@file
spec:
  ingressClassName: traefik
  rules:
    - host: api.plataformas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastify-api
                port:
                  number: 4000

---
# Staging ingress (for preview environments)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plataformas-staging
  namespace: plataformas-web-staging
  labels:
    app: plataformas-staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: staging.plataformas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs
                port:
                  number: 3000