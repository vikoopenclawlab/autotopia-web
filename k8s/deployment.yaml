apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-template
  namespace: nextjs-template
  labels:
    app: nextjs-template
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-template
  template:
    metadata:
      labels:
        app: nextjs-template
    spec:
      containers:
        - name: nextjs
          image: ghcr.io/vikoopenclawlab/nextjs-template-test/nextjs:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nextjs-template
            - secretRef:
                name: nextjs-template
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-template
  namespace: nextjs-template
spec:
  selector:
    app: nextjs-template
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextjs-template
  namespace: nextjs-template
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: nextjs-template.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs-template
                port:
                  number: 80
