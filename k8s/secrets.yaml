# Kubernetes Secrets
# NOTE: Real secrets managed via ExternalSecrets operator or HashiCorp Vault
# NEVER commit real values here - only placeholders
# See: docs/DEVSECOPS.md for secret management strategy

apiVersion: v1
kind: Secret
metadata:
  name: nextjs-secrets
  namespace: plataformas-web
type: Opaque
stringData:
  # PLACEHOLDER VALUES - DO NOT COMMIT REAL SECRETS
  # Use external secrets manager for production
  DATABASE_URL: "postgresql://postgres:<REPLACE_WITH_REAL_PASSWORD>@postgres:5432/app"
  REDIS_URL: "redis://:<REPLACE_WITH_REAL_PASSWORD>@redis:6379"
  MEILISEARCH_API_KEY: "<REPLACE_WITH_REAL_KEY>"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: plataformas-web
type: Opaque
stringData:
  # PLACEHOLDER VALUES
  DATABASE_URL: "postgresql://postgres:<REPLACE_WITH_REAL_PASSWORD>@postgres:5432/app"
  REDIS_URL: "redis://:<REPLACE_WITH_REAL_PASSWORD>@redis:6379"
  MEILISEARCH_API_KEY: "<REPLACE_WITH_REAL_KEY>"
  # JWT secret for auth
  JWT_SECRET: "<REPLACE_WITH_REAL_JWT_SECRET>"
  # API keys
  EXTERNAL_API_KEY: "<REPLACE_WITH_REAL_KEY>"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: plataformas-web
type: Opaque
stringData:
  # PLACEHOLDER
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "<REPLACE_WITH_REAL_PASSWORD>"